<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 小游戏</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <!-- 欢迎页 -->
      <section id="welcome-screen" class="welcome-screen">
        <div class="welcome-card">
          <h1 class="welcome-title">2048</h1>
          <p class="welcome-subtitle">滑动方块，合并数字，挑战更高分！</p>
          <div class="instructions">
            <div class="instruction-item">
              <kbd>↑</kbd>
              <span>向上滑动</span>
            </div>
            <div class="instruction-item">
              <kbd>↓</kbd>
              <span>向下滑动</span>
            </div>
            <div class="instruction-item">
              <kbd>←</kbd>
              <span>向左滑动</span>
            </div>
            <div class="instruction-item">
              <kbd>→</kbd>
              <span>向右滑动</span>
            </div>
          </div>
          <p class="welcome-tip">移动端可以使用滑动手势或屏幕下方的方向按钮</p>
          <button id="start-button" type="button" class="start-button">开始游戏</button>
        </div>
      </section>

      <!-- 游戏界面（初始隐藏） -->
      <section id="game-screen" class="hidden">
        <header class="topbar">
          <div class="heading">
            <h1>2048</h1>
            <p>使用键盘方向键合并数字</p>
          </div>
          <div class="actions">
            <section class="score-card" aria-label="当前得分">
              <span>当前得分</span>
              <strong id="score">0</strong>
            </section>
          </div>
        </header>

        <section class="board-section" aria-label="游戏棋盘">
          <div id="board" class="board"></div>
        </section>

        <!-- 游戏控制按钮 -->
        <div class="game-controls">
          <button id="pause-button" type="button" class="game-control-btn">暂停</button>
          <button id="restart-button" type="button" class="game-control-btn">重新开始</button>
        </div>

        <section id="touch-controls" class="touch-controls hidden" aria-label="移动端方向控制">
          <button class="touch-button touch-up" type="button" data-direction="up">↑</button>
          <button class="touch-button touch-left" type="button" data-direction="left">←</button>
          <button class="touch-button touch-right" type="button" data-direction="right">→</button>
          <button class="touch-button touch-down" type="button" data-direction="down">↓</button>
        </section>
      </section>
    </main>

    <!-- 暂停遮罩 -->
    <div id="pause-overlay" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="pause-title">
      <div class="modal-card">
        <h2 id="pause-title">游戏已暂停</h2>
        <p>当前得分</p>
        <strong id="pause-score">0</strong>
        <button id="resume-button" type="button">继续游戏</button>
      </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div id="game-over-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="game-over-title">
      <div class="modal-card">
        <h2 id="game-over-title">游戏结束</h2>
        <p>本次总得分</p>
        <strong id="final-score">0</strong>
        <button id="modal-restart-button" type="button">重新开始</button>
      </div>
    </div>

    <script src="./src/mobile-controls.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
