<h2>项目整体视觉风格</h2>
<p class="subtitle">选择你喜欢的设计语言，这将影响整个博客的配色、字体和氛围</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Minimal 极简白</h3>
      <p>白色为主，大量留白，线条干净，内容为王。类似 Notion / Medium 的阅读体验。</p>
    </div>
  </div>
  <div class="option" data-choice="warm" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Warm 温暖复古</h3>
      <p>温暖色调（米白/雪松背景），微复古字体风格，有旅行手帐的氛围感。</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>Dark 深色对比</h3>
      <p>深色背景搭配高饱和色彩，地图和照片视觉冲击力强，偏摄影师作品集。</p>
    </div>
  </div>
</div>
